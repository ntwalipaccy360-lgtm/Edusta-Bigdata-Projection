{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'dist/css/style.css' %}" />
    <title>Login to to EDUSTAT</title>
  </head>
  <body>
    <section class="min-h-screen bg-white flex items-center justify-center">
      <div class="flex w-full h-screen">
        <!-- Left Column - Form -->
        <div
          class="w-full lg:w-1/2 flex items-center justify-center px-4 sm:px-6 lg:px-8"
        >
          <div class="p-4 md:p-10 w-full max-w-md">
            <div class="flex justify-center">
              <img
                src="{% static 'images/auca-logo.png' %}"
                alt="AUCA Logo"
                class="h-30 w-60 object-contain"
              />
            </div>
            <div class="text-center mb-8">
              <h2 class="text-3xl font-bold text-[#426592] mb-2">Login</h2>
              <p class="text-gray-600">Welcome Please enter your details.</p>
            </div>
            <form
              method="post"
              action="{% url 'accounts:login' %}"
              class="space-y-6"
            >
              {% csrf_token %} {{ form.as_p }}
              <div class="flex justify-center">
                <button
                  type="submit"
                  class="mt-8 w-1/2 bg-[#426592] text-white py-3 rounded-sm font-semibold hover:bg-[#689ada] transition duration-200"
                >
                  Login
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- Right Column - Image (Hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 items-center justify-center">
          <img
            src="{% static 'images/hero-1.png' %}"
            alt="auca image"
            class="w-full h-screen object-cover"
          />
        </div>
      </div>
    </section>
  </body>
</html>
